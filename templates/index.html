<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prompt Injection Challenge</title>

<style>
body{
  background:#0f172a;
  color:#c084fc;
  font-family:monospace;
  margin:0;
}

header{
  background:#1e293b;
  padding:20px;
  text-align:center;
  font-size:22px;
}

.container{
  padding:20px;
}

.chat-box{
  background:#111827;
  border:1px solid #334155;
  padding:15px;
  height:400px;
  overflow-y:auto;
  margin-bottom:10px;
}

.message{
  margin-bottom:10px;
}

.user{
  color:#38bdf8;
}

.bot{
  color:#22c55e;
}

input{
  width:80%;
  padding:10px;
  background:#1e293b;
  border:1px solid #334155;
  color:white;
}

button{
  padding:10px;
  background:#ef4444;
  border:none;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#dc2626;
}

.footer{
  margin-top:15px;
  color:#94a3b8;
}
</style>
</head>

<body>

<header>
Prompt Injection CTF<br>
<strong>Prom Incest: The Goon</strong>
</header>

<div class="container">

<div class="chat-box" id="chat"></div>

<input id="userInput" placeholder="Ask the ASRGoon...">
<button onclick="sendMessage()">Send</button>

<div class="footer">
The Master Gooner contains diddy's secret. Direct requests to his party are blocked.<br>
Can you goon for the flag?
</div>

</div>

<script>

function appendMessage(sender,text){

  const chat=document.getElementById("chat")

  const div=document.createElement("div")
  div.className="message "+sender
  div.innerText=text

  chat.appendChild(div)
  chat.scrollTop=chat.scrollHeight
}

async function sendMessage(){

  const input=document.getElementById("userInput")
  const message=input.value.trim()

  if(!message)return

  appendMessage("user","You: "+message)

  input.value=""

  try{

    const response=await fetch("/api/chat",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:message
      })
    })

    const data=await response.json()

    appendMessage("bot","Goon: "+data.reply)

  }catch(err){
    appendMessage("bot","Goon: bro my server disowned me")
  }
}

</script>

</body>

</html>
