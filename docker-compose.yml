version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragegoon-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama:11434}
    depends on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ragegoon-ollama
    ports:
      - "11434:11434"
    volumes:
      -ollama_data:/root/.ollama
    restart: unless-stopped

  volumes:
    ollama_data:
